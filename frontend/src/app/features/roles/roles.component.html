<div class="page-header">
  <div>
    <h1>Roles</h1>
    <p>Consulta los roles del sistema</p>
  </div>
</div>

<mat-card class="table-card">
  <div class="table-header">
    <h2>Listado de roles</h2>
    <span>Total: {{ dataSource.data.length }}</span>
  </div>

  <div *ngIf="loading" class="state-message">
    Cargando roles...
  </div>

  <div *ngIf="!loading && errorMessage" class="state-message error">
    {{ errorMessage }}
  </div>

  <div class="table-wrapper" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1 custom-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let rol">{{ rol.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let rol">{{ rol.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let rol">{{ rol.descripcion || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let rol">
          <span
            class="status-badge"
            [class.active]="rol.estado"
            [class.inactive]="!rol.estado"
          >
            {{ rol.estado ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" colspan="4">
          No hay roles registrados.
        </td>
      </tr>
    </table>
  </div>

  <mat-paginator
    [length]="dataSource.data.length"
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
  >
  </mat-paginator>
</mat-card>
